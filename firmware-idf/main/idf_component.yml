## Managed component dependencies.
dependencies:
  idf: "^5.0"
  # mDNS: reachable as <dev_name>.local, advertises _http and _aidlink-adbp.
  espressif/mdns: "^1.2"
  # Onboard WS2812 RGB status LED (S3 only).
  espressif/led_strip:
    version: "^2.4"
    rules:
      - if: "target == esp32s3"
  # USB-NCM device class — only pulled in for targets with native USB-OTG.
  espressif/esp_tinyusb:
    version: "^2.0.0"
    rules:
      - if: "target in [esp32s2, esp32s3, esp32p4]"
  # LVGL + esp_lcd glue for the T-Display-S3 flight display (S3 only).
  lvgl/lvgl:
    version: "^9.2"
    rules:
      - if: "target == esp32s3"
  espressif/esp_lvgl_port:
    version: "^2.4"
    rules:
      - if: "target == esp32s3"
